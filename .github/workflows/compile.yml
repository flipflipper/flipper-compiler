name: compile-fap
# workflow-version: v2
run-name: ${{ inputs.build_id }}
on:
  workflow_dispatch:
    inputs:
      firmware:     { required: true, type: string }
      source_type:  { required: true, type: string }
      source_value: { required: true, type: string }
      app_name:     { required: true, type: string }
      build_id:     { required: true, type: string }

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install ufbt
        run: pip install --upgrade ufbt
      - name: Select firmware SDK
        run: |
          set -e
          case "${{ inputs.firmware }}" in
            ofw)         ufbt update --channel=release ;;
            unleashed)   ufbt update --index-url=https://up.unleashedflip.com/directory.json --channel=release ;;
            momentum)    ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release ;;
            roguemaster) ufbt update --index-url=https://up.unleashedflip.com/directory.json --channel=release ;;
            *) echo "unknown firmware"; exit 1 ;;
          esac
      - name: Stage source
        shell: bash
        run: |
          set -e
          mkdir -p app
          cd app
          case "${{ inputs.source_type }}" in
            zip)
              cp "../${{ inputs.source_value }}" src.zip
              unzip -o src.zip >/dev/null
              rm src.zip
              shopt -s dotglob nullglob
              entries=( * )
              if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
                mv "${entries[0]}"/* .
                rmdir "${entries[0]}" 2>/dev/null || true
              fi
              ;;
            repo)
              git clone --depth 1 "${{ inputs.source_value }}" tmp || {
                echo "::error::git clone failed for ${{ inputs.source_value }}"; exit 1;
              }
              rm -rf tmp/.git
              shopt -s dotglob nullglob
              files=( tmp/* )
              if [ ${#files[@]} -eq 0 ]; then
                echo "::error::repo appears to be empty"; exit 1;
              fi
              mv tmp/* .
              rm -rf tmp
              # If no application.fam at root, try to locate the app.
              if [ ! -f application.fam ]; then
                APPDIR=""
                # 1) exact match by app_name
                cand=$(find . -maxdepth 4 -type d -iname "${{ inputs.app_name }}" -print -quit 2>/dev/null || true)
                if [ -n "$cand" ] && [ -f "$cand/application.fam" ]; then APPDIR="$cand"; fi
                # 2) any directory containing application.fam
                if [ -z "$APPDIR" ]; then
                  fam=$(find . -maxdepth 5 -type f -name application.fam -print -quit 2>/dev/null || true)
                  if [ -n "$fam" ]; then APPDIR=$(dirname "$fam"); fi
                fi
                if [ -z "$APPDIR" ]; then
                  echo "::error::no application.fam found anywhere in repo — this isn't a single .fap source tree"; exit 1;
                fi
                echo "Using app directory: $APPDIR"
                mkdir -p ../_app && mv "$APPDIR"/* ../_app/
                shopt -s dotglob
                rm -rf ./* || true
                mv ../_app/* .
                rmdir ../_app 2>/dev/null || true
              fi
              ;;
            inline)
              printf '%s' "${{ inputs.source_value }}" | base64 -d > main.c
              SAFE='${{ inputs.app_name }}'
              cat > application.fam <<EOF
          App(
              appid="${SAFE}",
              name="${SAFE}",
              apptype=FlipperAppType.EXTERNAL,
              entry_point="${SAFE}_main",
              requires=["gui"],
              stack_size=2*1024,
              fap_category="Misc",
              sources=["*.c*"],
          )
          EOF
              ;;
          esac
          ls -la


      - name: Build
        working-directory: app
        run: ufbt
      - name: Locate .fap
        id: find
        run: |
          fap=$(find app/dist -name "*.fap" | head -n1)
          test -n "$fap" || { echo "no .fap produced"; exit 1; }
          echo "fap=$fap" >> $GITHUB_OUTPUT
          echo "name=$(basename $fap)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: fap-${{ inputs.build_id }}
          path: ${{ steps.find.outputs.fap }}
          retention-days: 1
      - name: Cleanup uploaded source
        if: always() && inputs.source_type == 'zip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          path="${{ inputs.source_value }}"
          sha=$(gh api "repos/${{ github.repository }}/contents/$path" --jq .sha 2>/dev/null)
          [ -n "$sha" ] && gh api -X DELETE "repos/${{ github.repository }}/contents/$path" \
            -f message="cleanup ${{ inputs.build_id }}" -f sha="$sha"
          exit 0
